<script>
// ── i18n ──
const LANG_FILES = { 'zh-CN': 'lang/zh-CN.js', 'zh-TW': 'lang/zh-TW.js', en: 'lang/en.js', ja: 'lang/ja.js' };

function t(key, vars) {
  let s = window.LANG?.[key] || key;
  if (vars) Object.entries(vars).forEach(([k, v]) => { s = s.replace(`{${k}}`, v); });
  return s;
}

function applyLang() {
  document.documentElement.lang = window.LANG?.code || 'zh-CN';
  document.querySelector('.title-overlay .en').textContent = t('titleEn');
  document.querySelector('.title-overlay h1').textContent = t('title');
  document.getElementById('city-search').placeholder = t('searchPlaceholder');
  document.querySelector('.legend h3').textContent = t('legend');
  // legend items: origin, originCity, provinceBorder, cityBorder
  const legendItems = document.querySelectorAll('.legend > .item');
  if (legendItems[0]) legendItems[0].querySelector('span:last-child').textContent = t('origin');
  if (legendItems[1]) legendItems[1].querySelector('span:last-child').textContent = t('originCity', { city: typeof currentCityName !== 'undefined' ? currentCityName : '' });
  if (legendItems[2]) legendItems[2].querySelector('span:last-child').textContent = t('provinceBorder');
  if (legendItems[3]) legendItems[3].querySelector('span:last-child').textContent = t('cityBorder');
  // subtitle and page title
  if (typeof currentCityName !== 'undefined') {
    document.getElementById('title-sub').textContent = t('subtitle', { city: currentCityName });
    document.title = t('pageTitle', { city: currentCityName });
    document.getElementById('legend-origin').textContent = t('originCity', { city: currentCityName });
  }
}

function loadLang(code) {
  return new Promise((resolve, reject) => {
    const old = document.getElementById('lang-script');
    const s = document.createElement('script');
    s.id = 'lang-script';
    s.src = LANG_FILES[code] || LANG_FILES['zh-CN'];
    s.onload = () => { resolve(); };
    s.onerror = reject;
    old.parentNode.replaceChild(s, old);
  });
}

// init lang from localStorage
(function() {
  const saved = localStorage.getItem('lang') || 'zh-CN';
  const sel = document.getElementById('lang-select');
  sel.value = saved;
  if (saved !== 'zh-CN') {
    loadLang(saved).then(applyLang);
  }
  sel.addEventListener('change', () => {
    const code = sel.value;
    localStorage.setItem('lang', code);
    loadLang(code).then(applyLang);
  });
})();
</script>

// ── 工具函数 ──
function haversine(lng1, lat1, lng2, lat2) {
  const R = 6371, dLat = (lat2 - lat1) * Math.PI / 180, dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function estimateDriveTime(lng, lat) {
  const dist = haversine(currentOrigin[0], currentOrigin[1], lng, lat);
  const roadDist = Math.round(dist * 1.35);
  const time = Math.round(roadDist / 85 * 10) / 10;
  return { time, dist: roadDist };
}

function getDriveData(feature) {
  const code = String(feature?.properties?.adcode || "");
  if (driveDataMap[code]) return driveDataMap[code];
  const center = feature?.properties?.centroid || feature?.properties?.center;
  if (!center || center.length !== 2) return null;
  const est = estimateDriveTime(center[0], center[1]);
  return { name: feature?.properties?.name || "", time: est.time, dist: est.dist, estimated: true };
}

function getBandColor(time) {
  if (typeof time !== "number") return "#d3d3d3";
  for (const b of colorBands) {
    if (time >= b.min && time < b.max) return b.color;
  }
  return colorBands[colorBands.length - 1].color;
}

function fmtTime(t) {
  return typeof t !== "number" ? "--" : Number.isInteger(t) ? `${t}` : `${t.toFixed(1)}`;
}

function styleCounty(feature) {
  const d = getDriveData(feature);
  return {
    color: "#fff",
    weight: 1,
    opacity: 0.8,
    fillOpacity: 0.75,
    fillColor: d ? getBandColor(d.time) : "#d3d3d3"

}

const infoName = document.getElementById("info-name");
const infoDetail = document.getElementById("info-detail");

function showInfo(dd) {
  if (!dd) { infoPanel.style.display = "none"; return; }
  const isOrigin = dd.isOrigin || dd.time === 0;
  infoName.textContent = isOrigin ? `🚗 ${dd.name}（${t('origin')}）` : dd.name;
  infoDetail.innerHTML = isOrigin
    ? `<span class="time">${t('originLabel')}</span>`
    : `<span class="time">🕐 ${fmtTime(dd.time)} ${t('timeUnit')}</span> · ${dd.dist} km${dd.estimated ? ' ' + t('estimated') : ''}`;
  infoPanel.style.display = "block";
}

// ── 标签 ──
function updateLabels() {
  labelLayer.clearLayers();
  const zoom = map.getZoom();
  const bounds = map.getBounds();
  const placed = [];

  const allFeatures = [
    ...allCountyFeatures.filter(f => { const d = getDriveData(f); if(!d) return false; if(String(f?.properties?.adcode)===originAdcode) return true; if(d.time>MAX_DRIVE_HOURS) return false; const c=f?.properties?.centroid||f?.properties?.center; if(c){const sd=haversine(currentOrigin[0],currentOrigin[1],c[0],c[1]); if(sd>MAX_STRAIGHT_KM) return false;} return true; }).map(f => ({ f, core: true })),
    ...allGrayFeatures.map(f => ({ f, core: false }))
  ];

  allFeatures.sort((a, b) => {
    const da = getDriveData(a.f);
    const db = getDriveData(b.f);
    if (String(a.f?.properties?.adcode) === originAdcode) return -1;
    if (String(b.f?.properties?.adcode) === originAdcode) return 1;
    if (a.core && !b.core) return -1;
    if (!a.core && b.core) return 1;
    return (da?.time || 99) - (db?.time || 99);
  });

  // detail: 0=名字, 1=名字+耗时, 2=名字+耗时+距离
  const cfg = zoom >= 11 ? { fs: 11, fsGray: 9, minD: 12, detail: 2 }
            : zoom >= 10 ? { fs: 10, fsGray: 8, minD: 16, detail: 2 }
            : zoom >= 9  ? { fs: 9,  fsGray: 7, minD: 18, detail: 2 }
            : zoom >= 8  ? { fs: 8,  fsGray: 6, minD: 14, detail: 1 }
            : zoom >= 7  ? { fs: 7,  fsGray: 5, minD: 10, detail: 1 }
            :              { fs: 6,  fsGray: 5, minD: 8,  detail: 0 };

  for (const { f, core } of allFeatures) {
    const driveInfo = getDriveData(f);
    const name = driveInfo?.name || f?.properties?.name || "";
    if (!name) continue;

    const center = f?.properties?.centroid || f?.properties?.center;
    if (!center || center.length !== 2) continue;
    const ll = L.latLng(center[1], center[0]);
    if (!bounds.contains(ll)) continue;

    const pt = map.latLngToContainerPoint(ll);
    if (placed.some(p => Math.abs(p.x - pt.x) < cfg.minD && Math.abs(p.y - pt.y) < cfg.minD)) continue;
    placed.push(pt);

    let text, fs, cls;
    if (core && driveInfo) {
      fs = cfg.fs;
      cls = "county-label";
      if (cfg.detail >= 2) {
        text = `${name}\n${fmtTime(driveInfo.time)}h / ${driveInfo.dist}km`;
      } else if (cfg.detail >= 1) {
        text = `${name}\n${fmtTime(driveInfo.time)}h`;
      } else {
        text = name;
      }
    } else {
      fs = cfg.fsGray;
      cls = "county-label gray";
      text = name;
    }

    L.marker(ll, {
      interactive: false,
      icon: L.divIcon({
        className: cls,
        html: `<span style="font-size:${fs}px">${text}</span>`,
        iconSize: [1,1]
      })
    }).addTo(labelLayer);
  }
}

// ── 搜索 ──
const searchInput = document.getElementById("city-search");
const searchResults = document.getElementById("search-results");
let searchTimer = null;

searchInput.addEventListener("input", () => {
  clearTimeout(searchTimer);
  const q = searchInput.value.trim();
  if (!q) { searchResults.style.display = "none"; return; }
  searchTimer = setTimeout(() => searchCity(q), 400);
});

async function searchCity(query) {
  try {
    const lang = window.LANG?.code || 'zh-CN';
    const acceptLang = lang === 'en' ? 'en' : lang === 'ja' ? 'ja' : 'zh';
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&addressdetails=1&limit=8&accept-language=${acceptLang}`;
    const res = await fetch(url);
    const data = await res.json();
    if (!data.length) {
      searchResults.innerHTML = `<div class="result-item" style="color:#888">${t('noResult')}</div>`;
      searchResults.style.display = "block";
      return;
    }
    searchResults.innerHTML = data.map((item, i) => {
      const name = item.display_name.split(",")[0];
      const sub = item.display_name.split(",").slice(1, 3).join(", ");
      const cc = item.address?.country_code || '';
      return `<div class="result-item" data-idx="${i}" data-lng="${item.lon}" data-lat="${item.lat}" data-name="${name}" data-cc="${cc}">
        <div>${name}</div>
        <div class="result-sub">${sub}</div>
      </div>`;
    }).join("");
    searchResults.style.display = "block";
    searchResults.querySelectorAll(".result-item[data-lng]").forEach(el => {
      el.addEventListener("click", () => {
        const lng = parseFloat(el.dataset.lng);
        const lat = parseFloat(el.dataset.lat);
        const name = el.dataset.name;
        const cc = el.dataset.cc;
        searchInput.value = name;
        searchResults.style.display = "none";
        showLoading(t('loading'));
        switchCity(name, lng, lat, cc);
      });
    });
  } catch(e) {
    searchResults.innerHTML = `<div class="result-item" style="color:#888">${t('searchFailed')}</div>`;
    searchResults.style.display = "block";
  }
}

// ── 数据加载 ──
// DataV 代理：线上走 /api/geo 代理（避免 CORS/403），本地直连
function geoURL(code) {
  if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
    return `https://geo.datav.aliyun.com/areas_v3/bound/${code}_full.json`;
  }
  return `/api/geo?code=${code}`;
}

async function fetchJSON(url, timeoutMs = 8000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const r = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    if (!r.ok) throw new Error(url);
    return r.json();
  } catch(e) {
    clearTimeout(timer);
    throw e;
  }
}

// 并发控制：最多同时 N 个请求
async function parallelLimit(tasks, limit = 5) {
  const results = [];
  let i = 0;
  async function worker() {
    while (i < tasks.length) {
      const idx = i++;
      results[idx] = await tasks[idx]();
    }
  }
  await Promise.all(Array.from({ length: Math.min(limit, tasks.length) }, () => worker()));
  return results;
}

// 加载省下面所有市 → 每个市的区县
// 直辖市 adcode（省级 _full 直接返回区级，不需要再往下钻）
const DIRECT_MUNICIPALITIES = new Set([110000, 120000, 310000, 500000]);

async function loadProvinceCounties(provAdcode) {
  try {
    const json = await fetchJSON(geoURL(provAdcode));
    const features = json.features || [];
    const provOutline = features.find(f => Number(f?.properties?.adcode) === provAdcode) || null;
    const cities = features.filter(f => Number(f?.properties?.adcode || 0) !== provAdcode);

    // 直辖市：省级 _full 返回的子级就是区，直接用
    if (DIRECT_MUNICIPALITIES.has(provAdcode)) {
      return {
        provAdcode, provOutline,
        cityResults: [{ adcode: provAdcode, counties: cities, outline: provOutline }]
      };
    }

    // 普通省：并发限制加载每个市的区县（最多5个同时）
    const cityTasks = cities.map(city => async () => {
      const cityCode = Number(city?.properties?.adcode);
      try {
        const cj = await fetchJSON(geoURL(cityCode));
        const counties = (cj.features || []).filter(f => {
          const parent = Number(f?.properties?.parent?.adcode || 0);
          return parent === cityCode;
        });
        return { adcode: cityCode, counties, outline: city };
      } catch(e) {
        return { adcode: cityCode, counties: [], outline: city };
      }
    });
    const cityResults = await parallelLimit(cityTasks, 5);

    return { provAdcode, provOutline, cityResults };
  } catch(e) {
    return { provAdcode, provOutline: null, cityResults: [] };
  }
}

// 加载省级轮廓（市级，不展开区县）
async function loadProvinceCities(provAdcode) {
  try {
    const json = await fetchJSON(geoURL(provAdcode));
    const features = json.features || [];
    const provOutline = features.find(f => Number(f?.properties?.adcode) === provAdcode) || null;
    const cities = features.filter(f => Number(f?.properties?.adcode || 0) !== provAdcode);
    return { provAdcode, provOutline, cities };
  } catch(e) {
    return { provAdcode, provOutline: null, cities: [] };
  }
}

// ── OSRM 批量驾车时间 ──
async function fetchOSRMBatch(originLng, originLat, destinations) {
  // destinations: [{ adcode, lng, lat, name }]
  // 每批最多 50 个
  const results = {};
  const batchSize = 50;

  for (let i = 0; i < destinations.length; i += batchSize) {
    const batch = destinations.slice(i, i + batchSize);
    const coords = `${originLng},${originLat};` + batch.map(d => `${d.lng},${d.lat}`).join(";");
    const destIndices = batch.map((_, j) => j + 1).join(";");
    const url = `https://router.project-osrm.org/table/v1/driving/${coords}?sources=0&destinations=${destIndices}&annotations=duration,distance`;

    try {
      const res = await fetch(url);
      const data = await res.json();
      if (data.code === "Ok") {
        const durations = data.durations[0];
        const distances = data.distances[0];
        batch.forEach((d, j) => {
          const timeSec = durations[j];
          const distM = distances[j];
          if (timeSec != null && timeSec > 0) {
            results[d.adcode] = {
              name: d.name,
              time: Math.round(timeSec / 360) / 10,
              dist: Math.round(distM / 1000)
            };
          }
        });
      }
    } catch(e) {}

    // 批次间间隔
    if (i + batchSize < destinations.length) {
      await new Promise(r => setTimeout(r, 500));
    }
  }
  return results;
}

// ── 渲染地图 ──
function renderMap(skipFitBounds = false) {
  // 清除旧图层（OSRM 刷新时需要重新渲染）
  const savedProvOutlines = activeLayers._provOutlines;
  // 暴力清除所有非底图图层，确保没有残留色块
  map.eachLayer(layer => {
    if (layer !== labelLayer && !layer._url) { // 保留 tileLayer（有 _url）和 labelLayer
      map.removeLayer(layer);
    }
  });
  activeLayers = [];
  activeLayers._provOutlines = savedProvOutlines;
  labelLayer.clearLayers();

  // 找 origin adcode
  originAdcode = null;
  let minDist = Infinity;
  for (const f of allCountyFeatures) {
    const c = f?.properties?.centroid || f?.properties?.center;
    if (c) {
      const d = haversine(currentOrigin[0], currentOrigin[1], c[0], c[1]);
      if (d < minDist) { minDist = d; originAdcode = String(f?.properties?.adcode || ""); }
    }
  }

  // 标记 origin
  if (originAdcode && driveDataMap[originAdcode]) {
    driveDataMap[originAdcode].isOrigin = true;
    driveDataMap[originAdcode].time = 0;
    driveDataMap[originAdcode].dist = 0;
  }

  // 灰色背景
  if (allGrayFeatures.length) {
    const grayLayer = L.geoJSON({ type: "FeatureCollection", features: allGrayFeatures }, {
      style: {
        color: "#ccc",
        weight: 0.5,
        opacity: 0.5,
        fillColor: "#e5e2da",
        fillOpacity: 0.45
      },
      onEachFeature(feature, layer) {
        const name = feature?.properties?.name || "";
        if (name) layer.bindTooltip(name, { sticky: true });
      }
    }).addTo(map);
    activeLayers.push(grayLayer);
  }

  // 灰色区域的市界
  if (allGrayCityOutlines.length) {
    const grayBorderLayer = L.geoJSON({ type: "FeatureCollection", features: allGrayCityOutlines.filter(Boolean) }, {
      style: { color: "rgba(255,255,255,0.5)", weight: 1.5, opacity: 0.6, fill: false },
      interactive: false
    }).addTo(map);
    activeLayers.push(grayBorderLayer);
  }

  // 过滤掉超过 MAX_DRIVE_HOURS 或直线距离过远的区县（避免飞地）
  const visibleFeatures = allCountyFeatures.filter(f => {
    const d = getDriveData(f);
    if (!d) return false;
    if (String(f?.properties?.adcode) === originAdcode) return true;
    if (d.time > MAX_DRIVE_HOURS) return false;
    // 直线距离检查：防止远处孤立区县通过高速连通导致飞地
    const center = f?.properties?.centroid || f?.properties?.center;
    if (center) {
      const straightDist = haversine(currentOrigin[0], currentOrigin[1], center[0], center[1]);
      if (straightDist > MAX_STRAIGHT_KM) return false;
    }
    return true;
  });

  // 县区填充层
  const countyLayer = L.geoJSON({ type: "FeatureCollection", features: visibleFeatures }, {
    style: styleCounty,
    onEachFeature(feature, layer) {
      const code = String(feature?.properties?.adcode || "");
      const isOriginCounty = (code === originAdcode);

      layer.on("mouseover", () => {
        countyLayer.resetStyle();
        layer.setStyle({ weight: 2.5, color: "#333", fillOpacity: 0.9 });
        layer.bringToFront();
        activeLayers.forEach(l => { if (l._isCityBorder || l._isProvBorder) l.bringToFront(); });
        showInfo(getDriveData(feature));
        // 恢复 origin hatch
        countyLayer.eachLayer(l => {
          const lc = String(l.feature?.properties?.adcode || "");
          if (lc === originAdcode && l._path && lc !== code) {
            l._path.setAttribute("fill", "url(#originHatch)");
            l._path.setAttribute("fill-opacity", "1");
          }
        });
      });
      layer.on("mouseout", () => {
        countyLayer.resetStyle(layer);
        infoPanel.style.display = "none";
        if (isOriginCounty && layer._path) {
          layer._path.setAttribute("fill", "url(#originHatch)");
          layer._path.setAttribute("fill-opacity", "1");
        }
      });
      layer.on("click", e => {
        L.DomEvent.stopPropagation(e);
        showInfo(getDriveData(feature));
      });

      if (isOriginCounty) {
        layer.on("add", () => {
          if (layer._path) {
            layer._path.style.fill = "url(#originHatch)";
            layer._path.style.fillOpacity = "1";
          }
        });
      }
    }
  }).addTo(map);
  activeLayers.push(countyLayer);

  // 点击地图关闭面板
  map.on("click", () => {
    infoPanel.style.display = "none";
    countyLayer.resetStyle();
  });
  map.getContainer().addEventListener("mouseleave", () => {
    countyLayer.resetStyle();
    infoPanel.style.display = "none";
  });

  // 市界
  const cityBorderLayer = L.geoJSON({ type: "FeatureCollection", features: allCityOutlines.filter(Boolean) }, {
    style(f) {
      const originCityCode = originAdcode ? Number(originAdcode.slice(0,4) + "00") : 0;
      const isOrigin = Number(f?.properties?.adcode) === originCityCode;
      return { color: isOrigin ? "#e88" : "rgba(255,255,255,0.5)", weight: isOrigin ? 2.5 : 1.5, opacity: isOrigin ? 0.8 : 0.6, fill: false };
    },
    interactive: false
  }).addTo(map);
  cityBorderLayer._isCityBorder = true;
  activeLayers.push(cityBorderLayer);

  // 省界
  const provinceOutlines = activeLayers._provOutlines || [];
  if (provinceOutlines.length) {
    const provBorderLayer = L.geoJSON({ type: "FeatureCollection", features: provinceOutlines }, {
      style: { color: "#888", weight: 2, dashArray: "6 6", fill: false, opacity: 0.8 },
      interactive: false
    }).addTo(map);
    provBorderLayer._isProvBorder = true;
    activeLayers.push(provBorderLayer);
  }

  // SVG hatch
  setTimeout(() => {
    const svg = map.getPanes().overlayPane.querySelector("svg");
    if (svg) {
      let defs = svg.querySelector("defs") || svg.insertBefore(document.createElementNS("http://www.w3.org/2000/svg", "defs"), svg.firstChild);
      if (!svg.querySelector("#originHatch")) {
        const pat = document.createElementNS("http://www.w3.org/2000/svg", "pattern");
        pat.setAttribute("id", "originHatch");
        pat.setAttribute("patternUnits", "userSpaceOnUse");
        pat.setAttribute("width", "8");
        pat.setAttribute("height", "8");
        pat.setAttribute("patternTransform", "rotate(45)");
        const bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        bg.setAttribute("width", "8"); bg.setAttribute("height", "8"); bg.setAttribute("fill", "#fff");
        const ln = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        ln.setAttribute("x", "0"); ln.setAttribute("y", "0");
        ln.setAttribute("width", "4"); ln.setAttribute("height", "8"); ln.setAttribute("fill", "#aa2211");
        pat.appendChild(bg); pat.appendChild(ln);
        defs.appendChild(pat);
      }
    }
  }, 200);

  // fitBounds（仅首次渲染，OSRM 刷新时不动视野）— 只基于可见区县
  if (!skipFitBounds && visibleFeatures.length) {
    const fitBounds = L.latLngBounds();
    visibleFeatures.forEach(f => {
      const c = f?.properties?.centroid || f?.properties?.center;
      if (c) fitBounds.extend(L.latLng(c[1], c[0]));
    });
    if (fitBounds.isValid()) map.fitBounds(fitBounds, { padding: [30, 30] });
  }

  updateLabels();
  map.off("zoomend moveend", updateLabels);
  map.on("zoomend moveend", updateLabels);
}

// ── 城市切换核心逻辑 ──
// 用 Overpass 查 place=city node 获取城市核心坐标（政治经济中心而非几何中心）
async function getCityCenter(name, lng, lat) {
  try {
    const r = 0.5; // 搜索半径 ~50km
    const query = `[out:json][timeout:5];node["place"~"city|town"]["name"~"${name}"](${lat-r},${lng-r},${lat+r},${lng+r});out 1;`;
    const res = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST", body: "data=" + encodeURIComponent(query)
    });
    const data = await res.json();
    if (data.elements && data.elements.length > 0) {
      const e = data.elements[0];
      return [e.lon, e.lat];
    }
  } catch(e) {}
  return null; // fallback 用原坐标
}

async function switchCity(name, lng, lat, countryCode) {
  // 0. 校准城市中心坐标（Nominatim 对大面积城市返回几何中心，不是主城区）
  const corrected = CITY_CENTERS[name] || CITY_CENTERS[name.replace(/市$/, '').replace(/白族自治州$/, '').replace(/自治州$/, '')];
  if (corrected) {
    lng = corrected[0]; lat = corrected[1];
  } else {
    const osm = await getCityCenter(name.replace(/市$/, ''), lng, lat);
    if (osm) { lng = osm[0]; lat = osm[1]; }
  }

  // 1. 清除旧图层
  for (const layer of activeLayers) {
    map.removeLayer(layer);
  }
  activeLayers = [];
  labelLayer.clearLayers();
  map.off("click");
  infoPanel.style.display = "none";

  // 2. 更新 origin
  currentOrigin = [lng, lat];
  currentCityName = name;

  // 3. 更新标题
  document.getElementById("title-sub").textContent = t('subtitle', { city: name });
  document.getElementById("legend-origin").textContent = t('originCity', { city: name });
  document.title = t('pageTitle', { city: name });

  // 4. loading
  showLoading(t('loading'));

  // 5. 判断是否在中国范围内
  const isChina = countryCode === 'cn' || (!countryCode && lat > 17 && lat < 55 && lng > 73 && lng < 136);

  allCountyFeatures = [];
  allGrayFeatures = [];
  allCityOutlines = [];
  allGrayCityOutlines = [];
  driveDataMap = {};
  const provinceOutlines = [];

  if (isChina) {
    // 中国：用 DataV API
    const nearProvinces = [];
    for (const prov of PROVINCES) {
      if (prov.code >= 710000) continue;
      const dist = haversine(lng, lat, prov.center[0], prov.center[1]);
      if (dist < 800) nearProvinces.push(prov); // 800km 确保覆盖大省边缘区县
    }

    const nearData = await parallelLimit(nearProvinces.map(p => () => loadProvinceCounties(p.code)), 3);

    for (const prov of nearData) {
      if (prov.provOutline) provinceOutlines.push(prov.provOutline);
      for (const city of prov.cityResults) {
        allCityOutlines.push(city.outline);
        for (const county of city.counties) {
          allCountyFeatures.push(county);
          const code = String(county?.properties?.adcode || "");
          const cname = county?.properties?.name || "";
          const center = county?.properties?.centroid || county?.properties?.center;
          if (center) {
            const est = estimateDriveTime(center[0], center[1]);
            driveDataMap[code] = { name: cname, time: est.time, dist: est.dist, estimated: true };
          }
        }
        if (city.counties.length === 0 && city.outline) {
          allCountyFeatures.push(city.outline);
          const code = String(city.outline?.properties?.adcode || "");
          const cname = city.outline?.properties?.name || "";
          const center = city.outline?.properties?.centroid || city.outline?.properties?.center;
          if (center) {
            const est = estimateDriveTime(center[0], center[1]);
            driveDataMap[code] = { name: cname, time: est.time, dist: est.dist, estimated: true };
          }
        }
      }
    }
  } else {
    // 海外：用 Overpass API 获取行政边界
    showLoading(t('loadingOverseas'));

    // 分两层查询：远距离查县级（level 6），近距离查镇级（level 7-8）
    // level 6 对应：法国省、德国县、日本都道府县在 level 4 所以也兼容
    const queries = [
      { radius: 400000, levels: "5|6", labelKey: "loadingAdmin" },
      { radius: 400000, levels: "4", labelKey: "loadingAdmin", fallback: true },
      { radius: 150000, levels: "7|8", labelKey: "loadingDetail" }
    ];

    for (const q of queries) {
      // fallback 查询只在前面数据太少时才执行
      if (q.fallback && allCountyFeatures.length >= 10) continue;
      showLoading(t(q.labelKey));
      const query = `[out:json][timeout:60];
        relation["boundary"="administrative"]["admin_level"~"^(${q.levels})$"]
        (around:${q.radius},${lat},${lng});
        out geom;`;

      try {
        const res = await fetch("https://overpass-api.de/api/interpreter", {
          method: "POST",
          body: "data=" + encodeURIComponent(query)
        });
        const data = await res.json();

        if (data.elements) {
          const seenIds = new Set(allCountyFeatures.map(f => f.properties.adcode));

          data.elements.forEach(el => {
            if (el.type !== "relation" || !el.members) return;
            const rCode = String(el.id);
            if (seenIds.has(rCode)) return; // 去重

            // 从 Overpass geom 构建 GeoJSON — 合并 outer ways 成环
            const outerWays = el.members.filter(m => m.type === "way" && m.role === "outer" && m.geometry);
            if (!outerWays.length) return;

            // 尝试将多个 way 首尾相连成完整环
            const rings = [];
            const segments = outerWays.map(w => w.geometry.map(p => [p.lon, p.lat]));
            const used = new Set();

            while (used.size < segments.length) {
              let ring = null;
              for (let i = 0; i < segments.length; i++) {
                if (used.has(i)) continue;
                if (!ring) {
                  ring = [...segments[i]];
                  used.add(i);
                  continue;
                }
                const last = ring[ring.length - 1];
                const first = segments[i][0];
                const lastR = segments[i][segments[i].length - 1];
                if (Math.abs(last[0]-first[0]) < 0.001 && Math.abs(last[1]-first[1]) < 0.001) {
                  ring.push(...segments[i].slice(1));
                  used.add(i);
                  i = -1; // restart search
                } else if (Math.abs(last[0]-lastR[0]) < 0.001 && Math.abs(last[1]-lastR[1]) < 0.001) {
                  ring.push(...segments[i].reverse().slice(1));
                  used.add(i);
                  i = -1;
                }
              }
              if (ring) rings.push(ring);
              else break;
            }

            if (!rings.length) return;

            const geom = rings.length === 1
              ? { type: "Polygon", coordinates: [rings[0]] }
              : { type: "MultiPolygon", coordinates: rings.map(r => [r]) };

            // 计算质心
            const allPts = rings[0];
            let sumLng = 0, sumLat = 0;
            allPts.forEach(c => { sumLng += c[0]; sumLat += c[1]; });
            const centroid = [sumLng / allPts.length, sumLat / allPts.length];

            // 名称优先级：中文 > 英文 > 原名
            const rName = el.tags?.["name:zh"] || el.tags?.["name:en"] || el.tags?.name || "";
            const est = estimateDriveTime(centroid[0], centroid[1]);

            allCountyFeatures.push({
              type: "Feature",
              properties: { name: rName, adcode: rCode, centroid, center: centroid },
              geometry: geom
            });
            driveDataMap[rCode] = { name: rName, time: est.time, dist: est.dist, estimated: true };
            seenIds.add(rCode);
          });
        }
      } catch (e) {
        console.error("Overpass API error:", e);
      }
    }
  }

  activeLayers._provOutlines = provinceOutlines;

  // 8. 检查本地缓存（用城市坐标作为 key）
  const cacheKey = `drive_${lng.toFixed(2)}_${lat.toFixed(2)}`;
  let cached = null;
  try { cached = JSON.parse(localStorage.getItem(cacheKey)); } catch(e) {}

  if (cached && typeof cached === 'object' && Object.keys(cached).length > 0) {
    // 有缓存：直接用缓存的 OSRM 数据
    for (const [code, data] of Object.entries(cached)) {
      if (driveDataMap[code]) {
        driveDataMap[code] = { ...driveDataMap[code], ...data, estimated: false };
      }
    }
    renderMap();
    hideLoading();
  } else {
    // 无缓存：先用估算数据渲染，再 OSRM 精确化
    renderMap();
    hideLoading();

    // 9. OSRM 批量计算真实驾车时间（逐批更新渲染）
    const destinations = [];
    for (const f of allCountyFeatures) {
      const code = String(f?.properties?.adcode || "");
      const center = f?.properties?.centroid || f?.properties?.center;
      const fname = f?.properties?.name || "";
      if (center && center.length === 2) {
        destinations.push({ adcode: code, lng: center[0], lat: center[1], name: fname });
      }
    }

    const batchSize = 50;
    const osrmCache = {};
    const batches = [];
    for (let i = 0; i < destinations.length; i += batchSize) {
      batches.push(destinations.slice(i, i + batchSize));
    }

    // 串行逐批请求 OSRM，每批完成后刷新
    showLoading(t('loadingDriveTime', { done: '0', total: String(batches.length) }));
    for (let bi = 0; bi < batches.length; bi++) {
      const batch = batches[bi];
      const coords = `${lng},${lat};` + batch.map(d => `${d.lng},${d.lat}`).join(";");
      const destIndices = batch.map((_, j) => j + 1).join(";");
      const url = `https://router.project-osrm.org/table/v1/driving/${coords}?sources=0&destinations=${destIndices}&annotations=duration,distance`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        if (data.code === "Ok") {
          const durations = data.durations[0];
          const distances = data.distances[0];
          batch.forEach((d, j) => {
            const timeSec = durations[j];
            const distM = distances[j];
            if (timeSec != null && timeSec > 0) {
              const result = {
                name: d.name,
                time: Math.round(timeSec / 360) / 10,
                dist: Math.round(distM / 1000)
              };
              driveDataMap[d.adcode] = { ...driveDataMap[d.adcode], ...result, estimated: false };
              osrmCache[d.adcode] = result;
            } else {
              // OSRM 返回 null = 无法到达（跨海等），标记为超远
              driveDataMap[d.adcode] = { ...driveDataMap[d.adcode], time: 999, dist: 0, estimated: false };
              osrmCache[d.adcode] = { name: d.name, time: 999, dist: 0 };
            }
          });
        }
      } catch(e) {}
      showLoading(t('loadingDriveTime', { done: String(bi + 1), total: String(batches.length) }));
      renderMap(true);
    }
    hideLoading();

    // 保存到 localStorage
    try { localStorage.setItem(cacheKey, JSON.stringify(osrmCache)); } catch(e) {}
  }
}

// ── 首次加载：杭州（预生成数据，秒开）──
(async function initHangzhou() {
  showLoading(t('loading'));
  try {
    const res = await fetch('data/hangzhou.json');
    const data = await res.json();

    currentOrigin = [120.15, 30.26];
    currentCityName = "杭州";
    document.getElementById("title-sub").textContent = t('subtitle', { city: '杭州' });
    document.getElementById("legend-origin").textContent = t('originCity', { city: '杭州' });
    document.title = t('pageTitle', { city: '杭州' });

    allCountyFeatures = data.features;
    driveDataMap = data.driveData;
    allCityOutlines = [];
    allGrayFeatures = [];
    allGrayCityOutlines = [];
    activeLayers._provOutlines = [];

    renderMap();
    hideLoading();
  } catch(e) {
    console.error('Failed to load preset data, falling back to API', e);
    switchCity("杭州", 120.15, 30.26);
  }
})();
